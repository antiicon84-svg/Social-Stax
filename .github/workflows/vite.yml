name: Vite build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - name: Install dependencies
      run: npm install
    - name: Build
      run: npm run build
      env:
        VITE_GOOGLE_API_KEY: ${{ secrets.VITE_GOOGLE_API_KEY }}
        VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
        VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
        VITE_FIREBASE_URL: ${{ secrets.VITE_FIREBASE_URL }}

    - name: Deploy to Firebase Hosting
      if: github.event_name == 'push' && matrix.node-version == '20.x'
      run: npx firebase-tools deploy --only hosting --project social-stax-7ce24 --token ${{ secrets.FIREBASE_TOKEN }}

    - name: Install Functions dependencies
      if: github.event_name == 'push' && matrix.node-version == '20.x'
      run: cd functions && npm install

    - name: Set Cloud Functions environment variables
      if: github.event_name == 'push' && matrix.node-version == '20.x'
      run: |
        echo "GOOGLE_API_KEY=${{ secrets.VITE_GOOGLE_API_KEY }}" > functions/.env
        echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> functions/.env
        echo "ADMIN_SETUP_SECRET=${{ secrets.ADMIN_SETUP_SECRET }}" >> functions/.env

    - name: Deploy Cloud Functions
      if: github.event_name == 'push' && matrix.node-version == '20.x'
      run: npx firebase-tools deploy --only functions --project social-stax-7ce24 --token ${{ secrets.FIREBASE_TOKEN }}
