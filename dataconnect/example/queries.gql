query AllUsers @auth(level: USER, insecureReason: "This operation is safe to expose to all logged in users.") {
  users {
    id
    username
    email
    displayName
    createdAt
  }
}

query UserById($userId: UUID!) @auth(level: USER) {
  user(id: $userId) {
    id
    username
    email
    displayName
    createdAt
    updatedAt
  }
}

mutation CreateUser($username: String!, $email: String!, $passwordHash: String!, $displayName: String) @auth(level: PUBLIC, insecureReason: "This operation is safe to expose to the public") {
  user_insert(data: {
    username: $username,
    email: $email,
    passwordHash: $passwordHash,
    displayName: $displayName,
    createdAt_expr: "request.time",
    updatedAt_expr: "request.time"
  }) {
    id
  }
}

mutation UpdateMyDisplayName($displayName: String!) @auth(level: USER) {
  user_update(
    key: {id_expr: "auth.uid"},
    data: {
      displayName: $displayName,
      updatedAt_expr: "request.time"
    }
  ) {
    id
  }
}